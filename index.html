<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Crown10Xclub | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #05070a; }
        body { background: var(--dark); color: #e5e7eb; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .gold-grad { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); color: #000; font-weight: 800; border-radius: 12px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .nav-item.active { color: var(--gold); transform: scale(1.1); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24 shadow-2xl relative">

    <div class="glass sticky top-0 z-[100] p-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black italic gold-grad">CROWN 10XCLUB</h1>
        </div>
        <div class="flex gap-4">
            <a href="https://t.me/crown10x100" target="_blank"><i class="fab fa-telegram text-blue-400 text-xl"></i></a>
            <i class="fas fa-bell text-yellow-500 animate-pulse"></i>
        </div>
    </div>

    <div id="app" class="p-4">
        <div class="glass rounded-[2.5rem] p-8 mb-6 relative overflow-hidden border-t border-white/10">
            <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Total Asset</p>
            <div class="flex justify-between items-end">
                <h2 class="text-4xl font-black italic tracking-tighter">₹ <span id="user-bal">0.00</span></h2>
                <button onclick="recharge()" class="btn-gold px-8 py-3 shadow-lg shadow-yellow-500/20">DEPOSIT</button>
            </div>
        </div>

        <div class="glass rounded-[2rem] p-6 mb-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Period</p>
                    <p id="pid" class="text-sm font-mono font-bold">20260508492</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-yellow-500 font-bold uppercase mb-1">Time Left</p>
                    <p id="timer" class="text-3xl font-black font-mono">03:00</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <button onclick="bet('Green')" class="bg-green-600 py-5 rounded-2xl font-black text-xs active:scale-95 transition">GREEN</button>
                <button onclick="bet('Violet')" class="bg-purple-600 py-5 rounded-2xl font-black text-xs active:scale-95 transition">VIOLET</button>
                <button onclick="bet('Red')" class="bg-red-600 py-5 rounded-2xl font-black text-xs active:scale-95 transition">RED</button>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden">
            <div class="p-4 bg-white/5 font-bold text-xs gold-grad">GAME HISTORY</div>
            <div id="record-list" class="text-[10px] text-gray-400"></div>
        </div>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black z-[500] p-6 overflow-y-auto">
        <div class="flex justify-between items-center border-b border-red-500/30 pb-4 mb-6">
            <h2 class="text-xl font-black text-red-500 italic">MASTER CONTROL</h2>
            <button onclick="closeAdmin()" class="bg-red-600 px-4 py-1 rounded text-xs font-bold">EXIT</button>
        </div>
        <div class="glass p-5 rounded-2xl mb-6">
            <p class="text-xs font-bold text-gray-400 mb-4 uppercase">Live Bets Monitoring</p>
            <div class="flex justify-between text-green-500 font-bold mb-2"><span>Green Bets:</span> <span id="adm-green">₹0</span></div>
            <div class="flex justify-between text-red-500 font-bold mb-4"><span>Red Bets:</span> <span id="adm-red">₹0</span></div>
            <div class="border-t border-white/5 pt-2 flex justify-between italic text-yellow-500"><span>Expected Profit:</span> <span id="adm-profit">₹0</span></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="forceNext('Green')" class="bg-green-900/40 text-green-500 p-4 rounded-xl border border-green-500/30 font-bold">FORCE GREEN</button>
            <button onclick="forceNext('Red')" class="bg-red-900/40 text-red-500 p-4 rounded-xl border border-red-500/30 font-bold">FORCE RED</button>
        </div>
        <div class="glass p-5 rounded-2xl">
            <p class="text-xs font-bold text-blue-400 mb-4 uppercase">Wallet Override</p>
            <input id="add-val" type="number" placeholder="Enter Amount" class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10">
            <button onclick="addMyBal()" class="w-full bg-blue-600 py-4 rounded-xl font-black">ADD BALANCE</button>
        </div>
    </div>

    <div class="fixed bottom-0 w-full max-w-md glass border-t border-white/5 flex justify-around py-5 z-[200]">
        <i class="fas fa-home nav-item active" onclick="location.reload()"></i>
        <a href="https://t.me/crown10x100" target="_blank"><i class="fas fa-users nav-item text-gray-600"></i></a>
        <div class="bg-gradient-to-tr from-yellow-600 to-yellow-200 w-12 h-12 rounded-full -mt-10 flex items-center justify-center shadow-xl shadow-yellow-500/20" id="admin-trigger">
            <i class="fas fa-shield-halved text-black"></i>
        </div>
        <i class="fas fa-wallet nav-item text-gray-600"></i>
        <i class="fas fa-user nav-item text-gray-600"></i>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('c10xc_bal')) || 0.00;
        let timer = 180;
        let nextResult = null;
        let liveBets = { Green: 0, Red: 0 };

        function updateUI() {
            document.getElementById('user-bal').innerText = balance.toLocaleString('en-IN', {minimumFractionDigits: 2});
            document.getElementById('adm-green').innerText = "₹" + liveBets.Green;
            document.getElementById('adm-red').innerText = "₹" + liveBets.Red;
            document.getElementById('adm-profit').innerText = "₹" + (liveBets.Green + liveBets.Red);
            localStorage.setItem('c10xc_bal', balance);
        }

        setInterval(() => {
            timer--;
            if(timer <= 0) {
                processResult();
                timer = 180;
                document.getElementById('pid').innerText = parseInt(document.getElementById('pid').innerText) + 1;
                liveBets = { Green: 0, Red: 0 };
            }
            let m = Math.floor(timer/60);
            let s = timer%60;
            document.getElementById('timer').innerText = `0${m}:${s<10?'0'+s:s}`;
            updateUI();
        }, 1000);

        function processResult() {
            let res = nextResult || (liveBets.Green > liveBets.Red ? 'Red' : 'Green');
            const list = document.getElementById('record-list');
            const row = `<div class="flex justify-between p-4 border-b border-white/5">
                <span>${document.getElementById('pid').innerText}</span>
                <span class="font-bold text-${res.toLowerCase()}-500">${res.toUpperCase()}</span>
                <span class="bg-white/10 px-2 rounded">${Math.floor(Math.random()*10)}</span>
            </div>`;
            list.insertAdjacentHTML('afterbegin', row);
            nextResult = null;
        }

        function bet(type) {
            if(timer <= 15) return alert("Market Locked!");
            let a = prompt(`Join ${type}. Enter Amount:`, "10");
            if(a && balance >= a) {
                balance -= a;
                liveBets[type === 'Violet' ? 'Green' : type] += parseInt(a);
                updateUI();
                alert("Bet Placed!");
            } else { alert("Insufficient Balance!"); }
        }

        let pressTimer;
        const trigger = document.getElementById('admin-trigger');
        ['mousedown', 'touchstart'].forEach(ev => trigger.addEventListener(ev, () => {
            pressTimer = setTimeout(() => {
                if(prompt("Admin PIN:") === "9012") document.getElementById('admin-panel').classList.remove('hidden');
            }, 3000);
        }));
        ['mouseup', 'mouseleave', 'touchend'].forEach(ev => trigger.addEventListener(ev, () => clearTimeout(pressTimer)));

        function forceNext(c) { nextResult = c; alert("Forced: " + c); }
        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }
        function addMyBal() { 
            let v = document.getElementById('add-val').value;
            if(v) { balance += parseInt(v); updateUI(); alert("Added!"); }
        }

        function recharge() {
            let a = prompt("Enter Amount:");
            if(a >= 100) window.location.href = `upi://pay?pa=amaanamaan868-1@oksbi&pn=Crown10Xclub&am=${a}&cu=INR`;
        }

        updateUI();
        for(let i=0; i<5; i++) processResult();
    </script>
</body>
</html>
